# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER , N, Browser, exec, $browser
bindd = SUPER SHIFT, N, Browser (private), exec, $browser --private
bindd = SUPER, M, Music, exec, sh -c 'hyprctl dispatch workspace 11 && omarchy-launch-or-focus spotify'
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER , SLASH, Passwords, exec, uwsm-app -- 1password
bindd = SUPER, d, Discord, exec, omarchy-launch-or-focus vesktop


bindd = SUPER, C, Calendar, exec, omarchy-launch-webapp "https://calendar.notion.so/"
bindd = SUPER, E, Email, exec, omarchy-launch-webapp "https://mail.google.com/mail/u/1"

# Screenshot bindings
bindd = SHIFT, PRINT, Screenshot (clipboard), exec, omarchy-cmd-screenshot smart clipboard

bind = SUPER SHIFT, M, movewindow, mon:DP-3
# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
unbind = SUPER, BACKSPACE
bindd = SUPER, BACKSPACE, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
